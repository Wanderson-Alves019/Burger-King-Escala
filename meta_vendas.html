<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta de Vendas - Burger King</title>
<link rel="icon" href="assets/images/LOGO BK.png" type="image/png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Flame:wght@400;700&family=Roboto:wght@400;500;700;900&display=swap');

  :root {
    --bk-beige: #F5EBDC;
    --bk-brown: #502314;
    --bk-orange: #FF8732;
    --bk-red: #D62300;
    --bk-yellow: #FFD700;
    --bk-green: #007A33;
    --bk-teal: #00A3A1;
    --bk-dark: #32140A;
    --shadow: 0 10px 30px rgba(80, 35, 20, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Roboto', sans-serif;
    background-color: var(--bk-beige);
    color: var(--bk-brown);
    padding: 30px;
    line-height: 1.6;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    padding: 25px 40px;
    border-radius: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
    border: 3px solid var(--bk-brown);
  }

  .header-info h1 {
    font-family: 'Flame', sans-serif;
    font-size: 32px;
    color: var(--bk-brown);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .header-info p {
    color: var(--bk-orange);
    font-weight: 900;
    text-transform: uppercase;
    font-size: 14px;
  }

  .bk-logo { width: 120px; }

  /* MAIN CONTENT */
  .main-content {
    background: white;
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 40px;
    border: 1px solid rgba(80, 35, 20, 0.1);
  }

  /* FORM SECTION */
  .form-section {
    margin-bottom: 40px;
  }

  .form-section h2 {
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--bk-brown);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--bk-orange);
  }

  .form-group {
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-group.full {
    grid-template-columns: 1fr;
  }

  .input-wrapper {
    display: flex;
    flex-direction: column;
  }

  .input-wrapper label {
    font-weight: 700;
    color: var(--bk-brown);
    margin-bottom: 8px;
    font-size: 13px;
    text-transform: uppercase;
  }

  .input-wrapper input,
  .input-wrapper select {
    padding: 12px 15px;
    border: 2px solid #ddd;
    border-radius: 12px;
    font-size: 14px;
    font-family: 'Roboto', sans-serif;
    transition: all 0.3s;
  }

  .input-wrapper input:focus,
  .input-wrapper select:focus {
    outline: none;
    border-color: var(--bk-orange);
    box-shadow: 0 0 0 3px rgba(255, 135, 50, 0.1);
  }

  .input-wrapper input[type="number"] {
    font-size: 16px;
  }

  /* TAX SELECTOR */
  .tax-selector {
    display: flex;
    gap: 15px;
    margin-top: 10px;
  }

  .tax-option {
    flex: 1;
    padding: 15px;
    border: 2px solid #ddd;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: white;
  }

  .tax-option:hover {
    border-color: var(--bk-orange);
    background: #fff9f5;
  }

  .tax-option input[type="radio"] {
    display: none;
  }

  .tax-option input[type="radio"]:checked + .tax-label {
    color: white;
  }

  .tax-option input[type="radio"]:checked ~ .tax-label {
    color: white;
  }

  .tax-option.active {
    background: var(--bk-orange);
    border-color: var(--bk-orange);
  }

  .tax-option.active .tax-label {
    color: white;
    font-weight: 900;
  }

  .tax-label {
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    color: var(--bk-brown);
    display: block;
    margin-bottom: 5px;
  }

  .tax-value {
    font-size: 20px;
    font-weight: 900;
    color: var(--bk-brown);
  }

  .tax-option.active .tax-value {
    color: white;
  }

  /* RESULTS SECTION */
  .results-section {
    background: #f9f9f9;
    border-radius: 16px;
    padding: 30px;
    border: 2px solid #eee;
    margin-top: 40px;
  }

  .results-section h2 {
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--bk-brown);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--bk-green);
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }

  .result-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border-left: 5px solid var(--bk-orange);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .result-card.success {
    border-left-color: var(--bk-green);
  }

  .result-card.alert {
    border-left-color: var(--bk-red);
  }

  .result-card.info {
    border-left-color: var(--bk-teal);
  }

  .result-label {
    font-size: 11px;
    text-transform: uppercase;
    color: #888;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-value {
    font-size: 24px;
    font-weight: 900;
    color: var(--bk-brown);
  }

  .result-card.success .result-value {
    color: var(--bk-green);
  }

  .result-card.alert .result-value {
    color: var(--bk-red);
  }

  .result-card.info .result-value {
    color: var(--bk-teal);
  }

  /* BUTTONS */
  .button-group {
    display: flex;
    gap: 15px;
    margin-top: 30px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 14px 30px;
    border: none;
    border-radius: 50px;
    font-weight: 900;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 13px;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    font-family: 'Roboto', sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--bk-orange);
    color: white;
  }

  .btn-primary:hover {
    background: #ff7000;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 135, 50, 0.3);
  }

  .btn-secondary {
    background: var(--bk-green);
    color: white;
  }

  .btn-secondary:hover {
    background: #005a26;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 122, 51, 0.3);
  }

  .btn-print {
    background: var(--bk-green);
    color: white;
  }

  .btn-print:hover {
    background: #005a26;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 122, 51, 0.3);
  }

  .btn-reset {
    background: #999;
    color: white;
  }

  .btn-reset:hover {
    background: #777;
    transform: translateY(-2px);
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* PRINT STYLES */
  @media print {
    @page { size: A4; margin: 10mm; }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    body { padding: 0 !important; margin: 0 !important; background: white !important; }
    .container { width: 100% !important; max-width: none !important; }
    .header { padding: 15px !important; margin-bottom: 20px !important; border-radius: 10px !important; }
    .header-info h1 { font-size: 20pt !important; }
    .bk-logo { width: 60px !important; }
    .main-content { padding: 20px !important; }
    .form-section { display: none !important; }
    .button-group { display: none !important; }
    .results-section { background: white !important; border: 1px solid #ddd !important; padding: 20px !important; }
    .results-grid { gap: 15px !important; }
    .result-card { padding: 15px !important; }
    .result-label { font-size: 9pt !important; }
    .result-value { font-size: 18pt !important; }
    .btn-voltar-portal { display: none !important; }
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .form-group {
      grid-template-columns: 1fr;
    }
    .header {
      flex-direction: column;
      gap: 20px;
      text-align: center;
    }
    .header-info h1 {
      font-size: 24px;
    }
    .main-content {
      padding: 20px;
    }
    .results-grid {
      grid-template-columns: 1fr;
    }
    .button-group {
      flex-direction: column;
    }
    .btn {
      width: 100%;
      justify-content: center;
    }
  }

  /* Estilo do Botão Voltar ao Portal */
  .btn-voltar-portal {
    position: fixed;
    top: 10px;
    left: 10px;
    background-color: #502314;
    color: #F5EBDC;
    padding: 5px 12px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 700;
    font-size: 11px;
    z-index: 10000;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1.5px solid #FF8732;
    font-family: 'Open Sans', sans-serif;
    opacity: 0.8;
    transition: all 0.3s;
  }

  .btn-voltar-portal:hover {
    opacity: 1;
    background-color: #D62300;
    transform: scale(1.02);
  }

  .btn-voltar-portal img {
    width: 18px;
    height: 18px;
  }

  @media print {
    .btn-voltar-portal {
      display: none !important;
    }
  }

</style>
</head>
<body>

    <!-- Botão Voltar ao Portal -->
    <a href="gestao_escala.html" class="btn-voltar-portal">
        <img src="assets/images/LOGO BK.png" alt="BK">
        <span>PORTAL</span>
    </a>

    <div class="container">
        <div class="header">
            <div class="header-info">
                <p>Gestão de Vendas</p>
                <h1>Meta de Vendas</h1>
            </div>
            <img src="assets/images/LOGO BK.png" class="bk-logo" alt="BK">
        </div>

        <div class="main-content">
            <!-- FORM SECTION -->
            <div class="form-section">
                <h2>📊 Informações de Vendas</h2>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <label for="metaVendas">Meta de Vendas (R$)</label>
                        <input type="number" id="metaVendas" placeholder="Ex: 10000" step="0.01" min="0">
                    </div>
                    <div class="input-wrapper">
                        <label for="vendidoVendas">Vendido até Agora (R$)</label>
                        <input type="number" id="vendidoVendas" placeholder="Ex: 7500" step="0.01" min="0">
                    </div>
                </div>

                <div class="form-section">
                    <h2>🧮 Percentual de Impostos</h2>
                    <div class="tax-selector">
                        <label class="tax-option active" id="tax-145">
                            <input type="radio" name="taxPercentage" value="14.5" checked onchange="calcularMeta()">
                            <span class="tax-label">14,5% de Impostos</span>
                            <span class="tax-value">÷ 0,855</span>
                        </label>
                        <label class="tax-option" id="tax-15">
                            <input type="radio" name="taxPercentage" value="15" onchange="calcularMeta()">
                            <span class="tax-label">15% de Impostos</span>
                            <span class="tax-value">÷ 0,85</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- RESULTS SECTION -->
            <div class="results-section">
                <h2>📈 Resultados</h2>
                <div class="results-grid">
                    <div class="result-card info">
                        <div class="result-label">Meta Sem Impostos</div>
                        <div class="result-value" id="metaSemImpostos">R$ 0,00</div>
                    </div>
                    <div class="result-card info">
                        <div class="result-label">Meta Com Impostos</div>
                        <div class="result-value" id="metaComImpostos">R$ 0,00</div>
                    </div>
                    <div class="result-card">
                        <div class="result-label">Já Vendido</div>
                        <div class="result-value" id="jaVendido">R$ 0,00</div>
                    </div>
                    <div class="result-card alert" id="faltaSemCard">
                        <div class="result-label">Falta (Sem Impostos)</div>
                        <div class="result-value" id="faltaSemImpostos">R$ 0,00</div>
                    </div>
                    <div class="result-card alert" id="faltaComCard">
                        <div class="result-label">Falta (Com Impostos)</div>
                        <div class="result-value" id="faltaComImpostos">R$ 0,00</div>
                    </div>
                    <div class="result-card success" id="percentualCard">
                        <div class="result-label">Percentual Atingido</div>
                        <div class="result-value" id="percentualAtingido">0%</div>
                    </div>
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="button-group">
                <button class="btn btn-primary" onclick="calcularMeta()">
                    <span>🔄</span> Calcular
                </button>
                <button class="btn btn-secondary" onclick="window.print()">
                    <span>🖨️</span> Imprimir
                </button>
                <button class="btn btn-reset" onclick="limparFormulario()">
                    <span>🗑️</span> Limpar
                </button>
            </div>
        </div>
    </div>

    <script>
        // Atualizar classe ativa ao mudar seleção de impostos
        document.querySelectorAll('input[name="taxPercentage"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.tax-option').forEach(opt => opt.classList.remove('active'));
                if (this.value === '14.5') {
                    document.getElementById('tax-145').classList.add('active');
                } else {
                    document.getElementById('tax-15').classList.add('active');
                }
                calcularMeta();
            });
        });

        // Calcular meta ao digitar
        document.getElementById('metaVendas').addEventListener('input', calcularMeta);
        document.getElementById('vendidoVendas').addEventListener('input', calcularMeta);

        function calcularMeta() {
            const metaVendas = parseFloat(document.getElementById('metaVendas').value) || 0;
            const vendidoVendas = parseFloat(document.getElementById('vendidoVendas').value) || 0;
            const taxPercentage = parseFloat(document.querySelector('input[name="taxPercentage"]:checked').value);
            
            // Calcular divisor baseado no percentual
            const divisor = 1 - (taxPercentage / 100);
            
            // Meta com impostos (dividir por 0,855 ou 0,85)
            const metaComImpostos = metaVendas / divisor;
            
            // Falta
            const faltaSemImpostos = Math.max(0, metaVendas - vendidoVendas);
            const faltaComImpostos = Math.max(0, metaComImpostos - vendidoVendas);
            
            // Percentual atingido
            const percentualAtingido = metaVendas > 0 ? (vendidoVendas / metaVendas) * 100 : 0;
            
            // Atualizar resultados
            document.getElementById('metaSemImpostos').textContent = formatarMoeda(metaVendas);
            document.getElementById('metaComImpostos').textContent = formatarMoeda(metaComImpostos);
            document.getElementById('jaVendido').textContent = formatarMoeda(vendidoVendas);
            document.getElementById('faltaSemImpostos').textContent = formatarMoeda(faltaSemImpostos);
            document.getElementById('faltaComImpostos').textContent = formatarMoeda(faltaComImpostos);
            document.getElementById('percentualAtingido').textContent = percentualAtingido.toFixed(1) + '%';
            
            // Atualizar cores dos cards
            const faltaSemCard = document.getElementById('faltaSemCard');
            const faltaComCard = document.getElementById('faltaComCard');
            const percentualCard = document.getElementById('percentualCard');
            
            faltaSemCard.classList.remove('success', 'alert');
            faltaComCard.classList.remove('success', 'alert');
            percentualCard.classList.remove('success', 'alert');
            
            if (faltaSemImpostos <= 0) {
                faltaSemCard.classList.add('success');
            } else {
                faltaSemCard.classList.add('alert');
            }
            
            if (faltaComImpostos <= 0) {
                faltaComCard.classList.add('success');
            } else {
                faltaComCard.classList.add('alert');
            }
            
            if (percentualAtingido >= 100) {
                percentualCard.classList.add('success');
            } else if (percentualAtingido >= 75) {
                percentualCard.classList.add('alert');
            }
        }

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        function limparFormulario() {
            document.getElementById('metaVendas').value = '';
            document.getElementById('vendidoVendas').value = '';
            document.getElementById('tax-145').classList.add('active');
            document.getElementById('tax-15').classList.remove('active');
            document.querySelector('input[value="14.5"]').checked = true;
            calcularMeta();
        }

        // Calcular ao carregar a página
        window.addEventListener('load', calcularMeta);
    </script>

</body>
</html>
