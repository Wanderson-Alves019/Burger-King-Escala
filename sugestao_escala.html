<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugestão Inteligente de Escala - Burger King</title>
<link rel="icon" href="assets/images/LOGO BK.png" type="image/png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Flame:wght@400;700&family=Roboto:wght@400;500;700;900&display=swap');

  :root {
    --bk-beige: #F5EBDC;
    --bk-brown: #502314;
    --bk-orange: #FF8732;
    --bk-red: #D62300;
    --bk-yellow: #FFD700;
    --bk-green: #007A33;
    --bk-teal: #00A3A1;
    --bk-dark: #32140A;
    --shadow: 0 10px 30px rgba(80, 35, 20, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Roboto', sans-serif;
    background-color: var(--bk-beige);
    color: var(--bk-brown);
    padding: 30px;
    line-height: 1.6;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
    padding: 25px 40px;
    border-radius: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
    border: 3px solid var(--bk-brown);
  }

  .header-info h1 {
    font-family: 'Flame', sans-serif;
    font-size: 32px;
    color: var(--bk-brown);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .header-info p {
    color: var(--bk-orange);
    font-weight: 900;
    text-transform: uppercase;
    font-size: 14px;
  }

  .bk-logo { width: 100px; }

  /* DAY SELECTOR */
  .day-selector-container {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
    overflow-x: auto;
  }

  .day-selector {
    display: flex;
    gap: 10px;
    min-width: max-content;
  }

  .day-btn {
    padding: 12px 18px;
    border: 2px solid #EEE;
    border-radius: 15px;
    background: #FDFDFD;
    cursor: pointer;
    transition: 0.3s;
    text-align: center;
    min-width: 80px;
    position: relative;
  }

  .day-btn:hover { border-color: var(--bk-orange); background: #FFF9F5; }
  .day-btn.active { background: var(--bk-orange); color: white; border-color: var(--bk-orange); box-shadow: 0 5px 15px rgba(255,135,50,0.3); }
  .day-btn .num { display: block; font-size: 20px; font-weight: 900; }
  .day-btn .week { font-size: 10px; text-transform: uppercase; font-weight: 700; opacity: 0.8; }
  .day-btn.critical { border-color: var(--bk-red); }
  .day-btn.critical::after { content: '⚠️'; font-size: 10px; position: absolute; top: 5px; right: 5px; }

  /* DASHBOARD CARDS */
  .analysis-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .analysis-card {
    background: white;
    padding: 25px;
    border-radius: 24px;
    box-shadow: var(--shadow);
    border-left: 8px solid var(--bk-brown);
    position: relative;
    overflow: hidden;
  }

  .analysis-card h3 { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 10px; }
  .analysis-card .value { font-size: 36px; font-weight: 900; color: var(--bk-brown); }
  .analysis-card .subtitle { font-size: 13px; font-weight: 700; }
  
  .card-lunch { border-left-color: var(--bk-teal); }
  .card-dinner { border-left-color: var(--bk-orange); }
  
  .status-tag {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 5px 12px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
  }
  .tag-ok { background: #E8F5E9; color: var(--bk-green); }
  .tag-alert { background: #FFF3E0; color: var(--bk-orange); }
  .tag-critico { background: #FFEBEE; color: var(--bk-red); }

  /* RECOMMENDATIONS */
  .recommendations-area {
    background: white;
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 30px;
    margin-bottom: 30px;
    border: 2px solid var(--bk-green);
  }

  .recommendations-area h2 {
    font-family: 'Flame', sans-serif;
    font-size: 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--bk-green);
  }

  .suggestion-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
  }

  .suggestion-item {
    background: #F8FFF9;
    padding: 15px 20px;
    border-radius: 15px;
    border: 1px solid #E0F2F1;
    display: flex;
    align-items: center;
    gap: 15px;
    animation: slideIn 0.5s ease-out;
  }

  @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

  .suggestion-icon {
    width: 40px;
    height: 40px;
    background: var(--bk-green);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    flex-shrink: 0;
  }

  .suggestion-text b { color: var(--bk-brown); display: block; margin-bottom: 2px; }
  .suggestion-text span { font-size: 13px; color: #555; }

  /* NO SUGGESTIONS */
  .no-suggestions {
    text-align: center;
    padding: 40px;
    color: #888;
    font-style: italic;
  }

  /* PORTAL BUTTON */
  .btn-voltar-portal {
    position: fixed;
    top: 15px;
    left: 15px;
    background-color: var(--bk-brown);
    color: var(--bk-beige);
    padding: 8px 15px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 700;
    font-size: 12px;
    z-index: 10000;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    display: flex;
    align-items: center;
    gap: 8px;
    border: 2px solid var(--bk-orange);
  }

  .btn-voltar-portal:hover { background: var(--bk-red); transform: scale(1.05); }
  .btn-voltar-portal img { width: 20px; height: 20px; }

  @media print {
    .btn-voltar-portal, .day-selector-container { display: none !important; }
    body { padding: 0; background: white; }
    .container { max-width: 100%; }
    .analysis-card { box-shadow: none; border: 1px solid #EEE; }
  }

    /* Responsividade para Dispositivos Móveis */
    @media screen and (max-width: 768px) {
        body { padding: 10px; }
        .container { padding: 15px; width: 100%; max-width: 100%; border-radius: 0; }
        .header h1 { font-size: 22px; }
        .header-info { flex-direction: column; gap: 10px; align-items: center; }
        table { display: block; overflow-x: auto; white-space: nowrap; }
        th, td { padding: 8px; font-size: 13px; }
        .btn-print { width: 100%; justify-content: center; }
        .actions-bar { flex-direction: column; gap: 10px; }
        .legenda-items { flex-direction: column; gap: 10px; }
        
        /* Ajustes específicos para menus e grids se existirem */
        .menu-grid, .grid-container { grid-template-columns: 1fr !important; }
        .card { margin-bottom: 15px; }
    }
    
    </style>
</head>
<body>

<a href="gestao_escala.html" class="btn-voltar-portal">
    <img src="assets/images/LOGO BK.png" alt="BK">
    <span>PORTAL</span>
</a>

<div class="container">
    <div class="header">
        <div class="header-info">
            <p>Inteligência de Dados</p>
            <h1>Sugestão Dinâmica de Escala</h1>
        </div>
        <img src="assets/images/LOGO BK.png" class="bk-logo" alt="BK">
    </div>

    <div class="day-selector-container">
        <div class="day-selector" id="daySelector"></div>
    </div>

    <div class="analysis-grid">
        <div class="analysis-card card-lunch">
            <h3>Meta Almoço</h3>
            <div class="value" id="valMetaLunch">0</div>
            <div class="subtitle" id="subLunch">Real: 0 / Saldo: 0</div>
            <div class="status-tag" id="tagLunch">Status</div>
        </div>
        <div class="analysis-card card-dinner">
            <h3>Meta Janta</h3>
            <div class="value" id="valMetaDinner">0</div>
            <div class="subtitle" id="subDinner">Real: 0 / Saldo: 0</div>
            <div class="status-tag" id="tagDinner">Status</div>
        </div>
        <div class="analysis-card">
            <h3>Equipe Disponível</h3>
            <div class="value" id="valTotalDay">0</div>
            <div class="subtitle">Colaboradores ativos hoje</div>
        </div>
    </div>

    <div class="recommendations-area">
        <h2>💡 Sugestões Inteligentes</h2>
        <div id="suggestionList" class="suggestion-list">
            <div class="no-suggestions">Selecione um dia para ver as sugestões dinâmicas...</div>
        </div>
    </div>
</div>

<script type="module" src="firebase-config.js"></script>
<script src="auth-manager.js"></script>
<script type="module" src="colaboradores.js" defer></script>
<script>
    // ========================================
    // CARREGAMENTO UNIFICADO COM FALLBACK
    // ========================================
    let dados = {};

    function carregarDadosSugestao() {
        // Tentar carregar do window.dadosEscala (preenchido pelo colaboradores.js)
        if (window.dadosEscala && window.dadosEscala.dadosCarregados) {
            dados = JSON.parse(JSON.stringify(window.dadosEscala));
            console.log('[Sugestão Escala] Dados carregados de window.dadosEscala:', dados.origemDados);
            return true;
        }
        
        // Fallback: tentar localStorage
        const dadosSalvos = localStorage.getItem('escalasData');
        if (dadosSalvos) {
            try {
                dados = JSON.parse(dadosSalvos);
                dados.origemDados = 'localStorage';
                console.log('[Sugestão Escala] Dados carregados de localStorage');
                return true;
            } catch (e) {
                console.error('[Sugestão Escala] Erro ao parsear localStorage:', e);
            }
        }
        
        // Fallback final: usar globais do colaboradores.js
        if (typeof mesConfig !== 'undefined' && typeof colaboradores !== 'undefined') {
            dados = {
                mesConfig: mesConfig,
                periodo: periodo,
                intermediarios: typeof intermediarios !== 'undefined' ? intermediarios : [],
                jovensAprendizes: typeof jovensAprendizes !== 'undefined' ? jovensAprendizes : [],
                colaboradores: colaboradores,
                origemDados: 'padrao'
            };
            console.log('[Sugestão Escala] Usando dados padrão do colaboradores.js');
            return true;
        }
        
        console.error('[Sugestão Escala] Nenhuma fonte de dados disponível');
        return false;
    }

    let selectedDay = 1;
    const diasSemana = ["domingo", "segunda", "terça", "quarta", "quinta", "sexta", "sábado"];
    const diasSemanaAbbr = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SÁB"];

    function init() {
        if (!carregarDadosSugestao()) return;
        renderDaySelector();
        selectDay(1);
    }

    function renderDaySelector() {
        const [primeiroDia, diaSemanaInicial, ultimoDia] = dados.mesConfig || [1, "segunda", 30];
        const startIndex = diasSemana.indexOf(diaSemanaInicial.toLowerCase());
        const container = document.getElementById('daySelector');
        container.innerHTML = '';

        for (let i = 1; i <= ultimoDia; i++) {
            const currentDayIndex = (startIndex + (i - 1)) % 7;
            const nomeSemana = diasSemana[currentDayIndex];
            const abbr = diasSemanaAbbr[currentDayIndex];
            const isDomingo = currentDayIndex === 0;

            const btn = document.createElement('div');
            btn.className = `day-btn ${i === selectedDay ? 'active' : ''}`;
            btn.innerHTML = `<span class="week">${abbr}</span><span class="num">${i}</span>`;
            btn.onclick = () => selectDay(i);
            
            if (checkIfCritical(i, nomeSemana, isDomingo)) {
                btn.classList.add('critical');
            }

            container.appendChild(btn);
        }
    }

    function checkIfCritical(diaNum, nomeSemana, isDomingo) {
        const stats = calculateStats(diaNum, nomeSemana, isDomingo);
        return (stats.lunchReal < stats.metaL || stats.dinnerReal < stats.metaD);
    }

    function calculateStats(diaNum, nomeSemana, isDomingo) {
        let lunchReal = 0;
        let dinnerReal = 0;
        let lunchOnly = [];
        let dinnerOnly = [];
        let ativos = [];
        let jasDisponiveis = [];

        if (!dados.colaboradores) return { lunchReal: 0, dinnerReal: 0, lunchOnly: [], dinnerOnly: [], metaL: 0, metaD: 0, ativos: [], jasDisponiveis: [] };

        dados.colaboradores.forEach(colab => {
            let estaTrabalhando = true;
            const diaSemanaAbbrLower = diasSemanaAbbr[diasSemana.indexOf(nomeSemana)].toLowerCase();
            
            if (colab.ferias && diaNum >= colab.ferias[0] && diaNum <= colab.ferias[1]) estaTrabalhando = false;
            else if (colab.descansoExtra && colab.descansoExtra.includes(diaNum)) estaTrabalhando = false;
            else if (isDomingo && colab.domingos && colab.domingos.includes(diaNum)) estaTrabalhando = false;
            else if (colab.folgaFixa && diaSemanaAbbrLower === colab.folgaFixa.normalize("NFD").replace(/[\u0300-\u036f]/g, "").substring(0, 3).toLowerCase()) estaTrabalhando = false;

            if (estaTrabalhando) {
                const isJA = dados.jovensAprendizes && dados.jovensAprendizes.some(ja => colab.nome.includes(ja));
                if (isJA) {
                    jasDisponiveis.push(colab);
                } else {
                    const hour = parseInt(colab.turno.split(':')[0]);
                    const inter = dados.intermediarios && dados.intermediarios.some(i => colab.nome.includes(i));
                    
                    if (hour <= 12 || inter) {
                        lunchReal++;
                        if (hour <= 12) lunchOnly.push(colab);
                    }
                    if (hour > 12 || inter) {
                        dinnerReal++;
                        if (hour > 12) dinnerOnly.push(colab);
                    }
                    ativos.push(colab);
                }
            }
        });

        return {
            lunchReal,
            dinnerReal,
            lunchOnly,
            dinnerOnly,
            metaL: window.metasLunch ? window.metasLunch[nomeSemana] : 5,
            metaD: window.metasDinner ? window.metasDinner[nomeSemana] : 11,
            ativos,
            jasDisponiveis
        };
    }

    function selectDay(diaNum) {
        selectedDay = diaNum;
        const [primeiroDia, diaSemanaInicial, ultimoDia] = dados.mesConfig || [1, "segunda", 30];
        const startIndex = diasSemana.indexOf(diaSemanaInicial.toLowerCase());
        const currentDayIndex = (startIndex + (diaNum - 1)) % 7;
        const nomeSemana = diasSemana[currentDayIndex];
        const isDomingo = currentDayIndex === 0;

        const stats = calculateStats(diaNum, nomeSemana, isDomingo);
        
        document.getElementById('valMetaLunch').textContent = stats.metaL;
        document.getElementById('valMetaDinner').textContent = stats.metaD;
        document.getElementById('valTotalDay').textContent = stats.ativos.length;
        
        const diffL = stats.lunchReal - stats.metaL;
        const diffD = stats.dinnerReal - stats.metaD;
        
        updateCardStatus('lunch', stats.lunchReal, stats.metaL, diffL);
        updateCardStatus('dinner', stats.dinnerReal, stats.metaD, diffD);
        
        generateSuggestions(stats, diaNum, nomeSemana);
        
        document.querySelectorAll('.day-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', (idx + 1) === diaNum);
        });
    }

    function updateCardStatus(prefix, real, meta, diff) {
        const sub = document.getElementById(`sub${prefix.charAt(0).toUpperCase() + prefix.slice(1)}`);
        const tag = document.getElementById(`tag${prefix.charAt(0).toUpperCase() + prefix.slice(1)}`);
        
        sub.textContent = `Real: ${real} / Saldo: ${diff > 0 ? '+' : ''}${diff}`;
        
        if (diff >= 0) {
            tag.textContent = "Coberto";
            tag.className = "status-tag tag-ok";
        } else if (diff >= -2) {
            tag.textContent = "Atenção";
            tag.className = "status-tag tag-alert";
        } else {
            tag.textContent = "Crítico";
            tag.className = "status-tag tag-critico";
        }
    }

    function generateSuggestions(stats, diaNum, nomeSemana) {
        const list = document.getElementById('suggestionList');
        list.innerHTML = '';
        
        const suggestions = [];
        const diffL = stats.lunchReal - stats.metaL;
        const diffD = stats.dinnerReal - stats.metaD;

        // 1. MOVIMENTAÇÃO INTELIGENTE: Se um turno tem excesso e outro tem déficit
        if (diffL > 1 && diffD < 0) {
            const numMover = Math.min(stats.lunchOnly.length, Math.abs(diffD));
            if (numMover > 0) {
                const nomesCandidatos = stats.lunchOnly.slice(0, numMover).map(c => c.nome.split(' ')[0]).join(', ');
                suggestions.push({
                    icon: '⇄',
                    title: `Mover ${numMover} para Janta`,
                    text: `Você tem <b>+${diffL} pessoas</b> no almoço. Mova <b>${nomesCandidatos}</b> para a janta e cubra o déficit de ${Math.abs(diffD)} pessoas.`
                });
            }
        } else if (diffD > 1 && diffL < 0) {
            const numMover = Math.min(stats.dinnerOnly.length, Math.abs(diffL));
            if (numMover > 0) {
                const nomesCandidatos = stats.dinnerOnly.slice(0, numMover).map(c => c.nome.split(' ')[0]).join(', ');
                suggestions.push({
                    icon: '⇄',
                    title: `Mover ${numMover} para Almoço`,
                    text: `Você tem <b>+${diffD} pessoas</b> na janta. Mova <b>${nomesCandidatos}</b> para o almoço e cubra o déficit de ${Math.abs(diffL)} pessoas.`
                });
            }
        }

        // 2. CONVERSÃO PARA INTERMEDIÁRIO: Se ambos os turnos têm déficit
        if (diffL < 0 && diffD < 0) {
            const deficitTotal = Math.abs(diffL) + Math.abs(diffD);
            const candidatos = stats.ativos.filter(c => !dados.intermediarios || !dados.intermediarios.some(i => c.nome.includes(i)));
            const numIntermediar = Math.min(candidatos.length, Math.ceil(deficitTotal / 2));
            if (numIntermediar > 0) {
                const nomesIntermediar = candidatos.slice(0, numIntermediar).map(c => c.nome.split(' ')[0]).join(', ');
                suggestions.push({
                    icon: '⚡',
                    title: `Converter ${numIntermediar} para Intermediário`,
                    text: `Ambos os turnos estão deficitários (Almoço: ${diffL}, Janta: ${diffD}). Converta <b>${nomesIntermediar}</b> para turno intermediário para cobrir ambos os picos.`
                });
            }
        }

        // 3. CONVERSÃO PARA INTERMEDIÁRIO: Se há excesso em um turno e déficit no outro (alternativa à movimentação)
        if ((diffL > 1 || diffD > 1) && (diffL < 0 || diffD < 0)) {
            const turnoComExcesso = diffL > 1 ? 'almoço' : 'janta';
            const turnoComDeficit = diffL < 0 ? 'almoço' : 'janta';
            const candidatos = diffL > 1 
                ? stats.lunchOnly.filter(c => !dados.intermediarios || !dados.intermediarios.some(i => c.nome.includes(i)))
                : stats.dinnerOnly.filter(c => !dados.intermediarios || !dados.intermediarios.some(i => c.nome.includes(i)));
            
            if (candidatos.length > 0) {
                const deficitAbsoluto = Math.abs(diffL < 0 ? diffL : diffD);
                const numConverter = Math.min(Math.ceil(deficitAbsoluto / 2), candidatos.length);
                const nomesConverter = candidatos.slice(0, numConverter).map(c => c.nome.split(' ')[0]).join(', ');
                suggestions.push({
                    icon: '⚡',
                    title: `Converter ${numConverter} em Intermediário (Alternativa)`,
                    text: `Ao invés de mover, converta <b>${nomesConverter}</b> para intermediário. Assim cobrem ambos os períodos com mais flexibilidade.`
                });
            }
        }

        // 4. ACIONAMENTO DE FOLGA: Caso crítico demais
        if (diffL < -2 || diffD < -2) {
            const quemFolga = dados.colaboradores.filter(c => {
                const diaSemanaAbbrLower = diasSemanaAbbr[diasSemana.indexOf(nomeSemana)].toLowerCase();
                return c.folgaFixa && diaSemanaAbbrLower === c.folgaFixa.normalize("NFD").replace(/[\u0300-\u036f]/g, "").substring(0, 3).toLowerCase();
            });
            
            if (quemFolga.length > 0) {
                suggestions.push({
                    icon: '📞',
                    title: `Acionamento de Folga`,
                    text: `O dia está muito crítico. Considere verificar a disponibilidade de <b>${quemFolga[0].nome}</b> (que está de folga fixa) para uma dobra remunerada.`
                });
            }
        }

        // 5. USO DE JOVEM APRENDIZ (Dinâmico conforme disponibilidade real)
        if (diffL < 0 || diffD < 0) {
            if (stats.jasDisponiveis.length > 0) {
                const nomesJAs = stats.jasDisponiveis.map(ja => ja.nome.split(' ')[0]).join(', ');
                suggestions.push({
                    icon: '🎓',
                    title: `Apoio de Aprendizes Ativos`,
                    text: `Hoje você conta com <b>${nomesJAs}</b> trabalhando. Utilize-os para suporte operacional, liberando os efetivos para as posições de meta.`
                });
            } else {
                const jasEscalados = dados.colaboradores.filter(c => dados.jovensAprendizes && dados.jovensAprendizes.some(ja => c.nome.includes(ja)));
                if (jasEscalados.length > 0) {
                    suggestions.push({
                        icon: '⏳',
                        title: `Aprendizes em Folga`,
                        text: `Atenção: Os Jovens Aprendizes estão de folga ou descanso extra hoje. A equipe efetiva precisará absorver todas as tarefas de suporte.`
                    });
                }
            }
        }

        // 6. ELOGIO se tudo estiver OK
        if (diffL >= 0 && diffD >= 0) {
            suggestions.push({
                icon: '⭐',
                title: `Escala Perfeita!`,
                text: `Parabéns! Sua escala para hoje atende todas as metas de produtividade da ZAMP.`
            });
        }

        if (suggestions.length === 0) {
            list.innerHTML = '<div class="no-suggestions">Nenhuma sugestão específica para este cenário.</div>';
        } else {
            suggestions.forEach(s => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `
                    <div class="suggestion-icon">${s.icon}</div>
                    <div class="suggestion-text">
                        <b>${s.title}</b>
                        <span>${s.text}</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }
    }

    window.addEventListener('load', () => {
        init();
    });

    // Também ouvir o evento de dados prontos (caso o Firebase termine depois do load)
    window.addEventListener('dadosEscalaProntos', () => {
        init();
    });
</script>

</body>
</html>
