  .diff-neg { color: var(--bk-red); font-weight: 900; }

  .status-tag {

    font-weight: 900;

  }

  .tag-ok { background: #E8F5E9; color: #2E7D32; }
  .tag-alert { background: #FFF3E0; color: #EF6C00; }
  .tag-critico { background: #FFEBEE; color: #C62828; }

  .badge-ja { background: #E0F2F1; color: #00796B; padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 10px; }

  #error-message {
    display: none;
    background: #FFEBEE;
    color: #C62828;
    padding: 20px;
    border-radius: 10px;
    text-align: center;

    margin-bottom: 20px;
  }

  .btn-print {
    background: var(--bk-brown);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 700;
    float: right;
  }

  @media print {
    @page { size: portrait; margin: 5mm; }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;

    .btn-print, .btn-voltar-portal { display: none !important; }
    body { padding: 0 !important; margin: 0 !important; background: white !important; }
    .header { margin-bottom: 10px !important; padding: 10px !important; border: 1px solid #eee !important; }
    .bk-logo { width: 40px !important; height: 40px !important; }
    h1 { font-size: 14pt !important; }
    h2 { font-size: 11pt !important; }
    .table-container { padding: 0 !important; box-shadow: none !important; }
    table { width: 100% !important; table-layout: fixed !important; }
    th { padding: 4px !important; font-size: 8pt !important; }
    td { padding: 3px !important; font-size: 8pt !important; }
    .status-tag { padding: 2px 4px !important; font-size: 7pt !important; }
  }

    


    /* Estilo do Botão Voltar ao Portal Atualizado */

        position: fixed;

        background-color: #502314;

        padding: 5px 12px;

        text-decoration: none;
        font-weight: 700;
        font-size: 11px;
        z-index: 10000;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        display: flex;

        font-family: 'Open Sans', sans-serif;

        opacity: 1;

    .btn-voltar-portal img {
        width: 18px;
        height: 18px;
    }

    @media print {
        .btn-voltar-portal {
            display: none !important;
        }
    }


    /* Responsividade para Dispositivos Móveis */
    @media screen and (max-width: 768px) {
        body { padding: 10px; }
        .container { padding: 15px; width: 100%; max-width: 100%; border-radius: 0; }
        .header h1 { font-size: 22px; }
        .header-info { flex-direction: column; gap: 10px; align-items: center; }
        table { display: block; overflow-x: auto; white-space: nowrap; }

        .actions-bar { flex-direction: column; gap: 10px; }
        .legenda-items { flex-direction: column; gap: 10px; }
        
        /* Ajustes específicos para menus e grids se existirem */
        .menu-grid, .grid-container { grid-template-columns: 1fr !important; }
        .card { margin-bottom: 15px; }
    }
    
    </style>
</head>
<body>

    <!-- Botão Voltar ao Portal Atualizado -->
    <a href="gestao_escala.html" class="btn-voltar-portal">
        <img src="assets/images/LOGO BK.png" alt="BK">
        <span>PORTAL</span>
    </a>


    
    


<div id="error-message">⚠️ ERRO: Arquivo "colaboradores.js" não encontrado.</div>

<div class="header">
  <img src="assets/images/LOGO BK.png" class="bk-logo" alt="BK">
  <div>
    <h1>Análise de Metas Teóricas</h1>
    <h2 id="periodo-subtitle">Almoço vs Janta</h2>
  </div>
  <div style="flex-grow: 1;">
    <button class="btn-print" onclick="window.print()">🖨️ Imprimir Relatório</button>
  </div>
</div>

<div class="table-container">
  <table id="metas-table">
    <thead>
      <tr>
        <th rowspan="2">Dia</th>
        <th rowspan="2">J.A. (Extra)</th>
        <th colspan="4" style="background: #FFF3E0; color: #E65100;">Almoço (Efetivos)</th>
        <th colspan="4" style="background: #EFEBE9; color: #4E342E;">Janta (Efetivos)</th>
      </tr>
      <tr>
        <th style="background: #FFF3E0; color: #E65100;">Real</th>
        <th style="background: #FFF9C4; color: #E65100;">Meta</th>
        <th style="background: #FFF3E0; color: #E65100;">Diff</th>
        <th style="background: #FFF3E0; color: #E65100;">Status</th>
        <th style="background: #EFEBE9; color: #4E342E;">Real</th>
        <th style="background: #FFF9C4; color: #4E342E;">Meta</th>
        <th style="background: #EFEBE9; color: #4E342E;">Diff</th>
        <th style="background: #EFEBE9; color: #4E342E;">Status</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script type="module" src="firebase-config.js"></script>
<script src="auth-manager.js"></script>
<script type="module" src="colaboradores.js" defer></script>

<script>
// ========================================
// CARREGAMENTO UNIFICADO COM FALLBACK
// ========================================
let dados = {};

function carregarDadosAnalise2() {
    // Tentar carregar do window.dadosEscala (preenchido pelo colaboradores.js)
    if (window.dadosEscala && window.dadosEscala.dadosCarregados) {
        dados = JSON.parse(JSON.stringify(window.dadosEscala));
        console.log('[Análise Metas 2] Dados carregados de window.dadosEscala:', dados.origemDados);
        return true;
    }
    
    // Fallback: tentar localStorage
    const dadosSalvos = localStorage.getItem('escalasData');
    if (dadosSalvos) {
        try {
            dados = JSON.parse(dadosSalvos);
            dados.origemDados = 'localStorage';
            console.log('[Análise Metas 2] Dados carregados de localStorage');
            return true;
        } catch (e) {
            console.error('[Análise Metas 2] Erro ao parsear localStorage:', e);
        }
    }
    
    // Fallback final: usar globais do colaboradores.js
    if (typeof mesConfig !== 'undefined' && typeof colaboradores !== 'undefined') {
        dados = {
            mesConfig: mesConfig,
            periodo: periodo,
            intermediarios: typeof intermediarios !== 'undefined' ? intermediarios : [],
            jovensAprendizes: typeof jovensAprendizes !== 'undefined' ? jovensAprendizes : [],
            colaboradores: colaboradores,
            origemDados: 'padrao'
        };
        console.log('[Análise Metas 2] Usando dados padrão do colaboradores.js');
        return true;
    }
    
    console.error('[Análise Metas 2] Nenhuma fonte de dados disponível');
    return false;
}

function renderMetas() {
    if (!carregarDadosAnalise2()) {
        document.getElementById('error-message').style.display = 'block';
        return;
    }
    // Usar metas do objeto dados (carregado via Firebase/Local) ou globais com fallback
    const mAlmocoPadrao = { 'segunda': 5, 'terça': 5, 'quarta': 5, 'quinta': 6, 'sexta': 7, 'sábado': 7, 'domingo': 5 };
    const mJantaPadrao = { 'segunda': 11, 'terça': 12, 'quarta': 12, 'quinta': 12, 'sexta': 13, 'sábado': 15, 'domingo': 11 };
    
    const metasLunchRef = dados.metasLunch || (typeof metasLunch !== 'undefined' ? metasLunch : mAlmocoPadrao);
    const metasDinnerRef = dados.metasDinner || (typeof metasDinner !== 'undefined' ? metasDinner : mJantaPadrao);
    
    const configMes = dados.mesConfig || [1, "sexta", 31];
    const diasSemana = ["domingo", "segunda", "terça", "quarta", "quinta", "sexta", "sábado"];
    const diasSemanaAbbr = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SÁB"];

    function getDiasDoMes(config) {
      const [primeiroDia, diaSemanaInicial, ultimoDia] = config;
      const startIndex = diasSemana.indexOf(diaSemanaInicial.toLowerCase());
      const dias = [];
      for (let i = 1; i <= ultimoDia; i++) {
        const currentDayIndex = (startIndex + (i - 1)) % 7;
        dias.push({ numero: i, nomeSemana: diasSemana[currentDayIndex], abbr: diasSemanaAbbr[currentDayIndex], isDomingo: currentDayIndex === 0 });
      }
      return dias;
    }

    const listaDias = getDiasDoMes(configMes);
    if (dados.periodo) document.getElementById('periodo-subtitle').innerText = `Almoço vs Janta - ${dados.periodo}`;
    const tbody = document.getElementById('table-body');

    function isIntermediario(name) {
      const n = name.toUpperCase();
      return dados.intermediarios && dados.intermediarios.some(i => n.includes(i.toUpperCase()));
    }

    function isJA(name) {
      const n = name.toUpperCase();
      return dados.jovensAprendizes && dados.jovensAprendizes.some(ja => n.includes(ja.toUpperCase()));
    }

    listaDias.forEach(dia => {
      let lunchReal = 0;
      let dinnerReal = 0;
      let jaAtivos = 0;

      dados.colaboradores.forEach(colab => {
        const diaNum = dia.numero;
        const diaSemanaNome = dia.abbr.toLowerCase();
        let estaTrabalhando = true;
        
        if (colab.ferias && diaNum >= colab.ferias[0] && diaNum <= colab.ferias[1]) estaTrabalhando = false;
        else if (colab.descansoExtra && colab.descansoExtra.includes(diaNum)) estaTrabalhando = false;
        else if (dia.isDomingo && colab.domingos && colab.domingos.includes(diaNum)) estaTrabalhando = false;
        else if (colab.folgaFixa && diaSemanaNome === colab.folgaFixa.normalize("NFD").replace(/[\u0300-\u036f]/g, "").substring(0, 3).toLowerCase()) estaTrabalhando = false;

        if (estaTrabalhando) {
          const hour = parseInt(colab.turno.split(':')[0]);
          const inter = isIntermediario(colab.nome);
          const ja = isJA(colab.nome);
          
          if (ja) {
              jaAtivos++;
          } else {
              if (hour <= 12 || inter) lunchReal++;
              if (hour > 12 || inter) dinnerReal++;
          }
        }
      });

      const mAlmoco = metasLunchRef[dia.nomeSemana];
      const mJanta = metasDinnerRef[dia.nomeSemana];
      const diffAlmoco = lunchReal - mAlmoco;
      const diffJanta = dinnerReal - mJanta;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="day-col">${dia.numero.toString().padStart(2,'0')} - ${dia.abbr}</td>
        <td><span class="badge-ja">${jaAtivos}</span></td>
        <td class="real-val">${lunchReal}</td>
        <td class="meta-val">${mAlmoco}</td>
        <td class="${diffAlmoco >= 0 ? 'diff-pos' : 'diff-neg'}">${diffAlmoco > 0 ? '+' : ''}${diffAlmoco}</td>
        <td><span class="status-tag ${getStatusClass(diffAlmoco)}">${getStatusText(diffAlmoco)}</span></td>
        <td class="real-val">${dinnerReal}</td>
        <td class="meta-val">${mJanta}</td>
        <td class="${diffJanta >= 0 ? 'diff-pos' : 'diff-neg'}">${diffJanta > 0 ? '+' : ''}${diffJanta}</td>
        <td><span class="status-tag ${getStatusClass(diffJanta)}">${getStatusText(diffJanta)}</span></td>
      `;
      tbody.appendChild(tr);
    });

    function getStatusClass(diff) {
      if (diff >= 0) return 'tag-ok';
      if (diff >= -2) return 'tag-alert';
      return 'tag-critico';
    }

    function getStatusText(diff) {
      if (diff > 0) return 'Excesso';
      if (diff === 0) return 'Meta OK';
      if (diff >= -2) return 'Atenção';
      return 'Crítico';
    }
}

window.addEventListener('load', () => {
   return renderMetas();
});

// Também ouvir o evento de dados prontos (caso o Firebase termine depois do load)
window.addEventListener('dadosEscalaProntos', () => {
   return renderMetas();
});
</script>
</body>
</html>
